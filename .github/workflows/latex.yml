name: Build LaTeX PDFs

on:
  push:
    paths:
      - "LaTeXTemplate_ActaPhysicaSinica-main/**"
      - ".github/workflows/latex.yml"
  pull_request:
    paths:
      - "LaTeXTemplate_ActaPhysicaSinica-main/**"
      - ".github/workflows/latex.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify template files exist
        shell: bash
        run: |
          test -f "LaTeXTemplate_ActaPhysicaSinica-main/template.tex"
          test -f "LaTeXTemplate_ActaPhysicaSinica-main/acta_physica_sinica.sty"
          test -f "LaTeXTemplate_ActaPhysicaSinica-main/acta_physica_sinica.bst"

      - name: Compile LaTeX documents
        uses: xu-cheng/latex-action@v4
        with:
          root_file: template.tex
          working_directory: LaTeXTemplate_ActaPhysicaSinica-main
          work_in_root_file_dir: true
          latexmk_use_xelatex: true

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: acta-physica-sinica-pdf
          path: LaTeXTemplate_ActaPhysicaSinica-main/template.pdf
          if-no-files-found: error
